<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Test Automation Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-top: 2px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-card), var(--glow-cyan);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 6px;
      font-size: 32px;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(76,201,240,0.4));
    }

    .login-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .login-form { display: flex; flex-direction: column; gap: 14px; }

    .login-field { display: flex; flex-direction: column; gap: 6px; }

    .login-field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
    }

    .login-field input {
      background: var(--bg-root);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--radius);
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-login-primary {
      background: var(--grad-accent);
      color: #fff;
      box-shadow: 0 0 14px rgba(76, 201, 240, 0.25);
    }
    .btn-login-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 24px rgba(76, 201, 240, 0.4);
    }
    .btn-login-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      background: var(--fail-bg);
      border: 1px solid rgba(255, 77, 106, 0.3);
      border-radius: var(--radius);
      color: var(--fail);
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="wip-banner">
    🚧 Work in Progress — This dashboard is not yet ready for use
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">◈</div>
      <h1 class="login-title">Test Automation Dashboard</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <!-- Error message -->
      <div id="login-error" class="login-error hidden"></div>

      <!-- Email / password -->
      <form id="login-form" class="login-form">
        <div class="login-field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="submit-btn" class="btn-login btn-login-primary">Sign In</button>
      </form>


    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    // If already authenticated, skip the login page
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    // Email / password sign-in
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      hideError();

      const { error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.replace('index.html');
      }
    });

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() {
      document.getElementById('login-error').classList.add('hidden');
    }
  </script>
</body>
</html>
