<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Test Automation Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-top: 2px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-card), var(--glow-cyan);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 6px;
      font-size: 32px;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(76,201,240,0.4));
    }

    .login-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .login-form { display: flex; flex-direction: column; gap: 14px; }

    .login-field { display: flex; flex-direction: column; gap: 6px; }

    .login-field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
    }

    .login-field input {
      background: var(--bg-root);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--radius);
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-login-primary {
      background: var(--grad-accent);
      color: #fff;
      box-shadow: 0 0 14px rgba(76, 201, 240, 0.25);
    }
    .btn-login-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 24px rgba(76, 201, 240, 0.4);
    }
    .btn-login-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-login-oauth {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-login-oauth:hover {
      background: var(--border);
      border-color: var(--border-light);
    }

    .oauth-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
      margin: 4px 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-error {
      background: var(--fail-bg);
      border: 1px solid rgba(255, 77, 106, 0.3);
      border-radius: var(--radius);
      color: var(--fail);
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="wip-banner">
    🚧 Work in Progress — This dashboard is not yet ready for use
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">◈</div>
      <h1 class="login-title">Test Automation Dashboard</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <!-- Error message -->
      <div id="login-error" class="login-error hidden"></div>

      <!-- Email / password -->
      <form id="login-form" class="login-form">
        <div class="login-field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="submit-btn" class="btn-login btn-login-primary">Sign In</button>
      </form>

      <div class="divider">or</div>

      <!-- OAuth -->
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn-login btn-login-oauth" onclick="signInWithGoogle()">
          <!-- Google icon -->
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>

        <button class="btn-login btn-login-oauth" onclick="signInWithMicrosoft()">
          <!-- Microsoft icon -->
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
            <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
            <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
            <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
          </svg>
          Sign in with Microsoft
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    // If already authenticated, skip the login page
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    // Email / password sign-in
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      hideError();

      const { error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.replace('index.html');
      }
    });

    async function signInWithGoogle() {
      hideError();
      const { error } = await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options:  { redirectTo: window.location.origin + '/index.html' },
      });
      if (error) showError(error.message);
    }

    async function signInWithMicrosoft() {
      hideError();
      const { error } = await _supabase.auth.signInWithOAuth({
        provider: 'azure',
        options:  { redirectTo: window.location.origin + '/index.html' },
      });
      if (error) showError(error.message);
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() {
      document.getElementById('login-error').classList.add('hidden');
    }
  </script>
</body>
</html>
